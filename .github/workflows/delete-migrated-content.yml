name: Delete migrated content files

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Delete all .mdoc files from content channel folders
        run: |
          for dir in src/content/dispatch src/content/transit src/content/gear src/content/coord src/content/table src/content/chow; do
            if [ -d "$dir" ]; then
              find "$dir" -name "*.mdoc" -type f -print -delete
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: delete corrupted migrated content files — re-entering via Keystatic" || echo "Nothing to delete"
          git push
