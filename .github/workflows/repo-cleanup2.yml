name: Repository cleanup — remove stale files
on:
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Remove stale root-level files
        run: |
          git rm -f index.html || true
          git rm -f sitemap.xml || true
          git rm -f .nojekyll || true
          git rm -f gear-policy.md || true
          git rm -f style.css || true
          git rm -f telescope2.jpg || true
          git rm -f telescope2.png || true
          git rm -f favicon.png || true

      - name: Remove old site folders
        run: |
          git rm -rf about/ || true
          git rm -rf chow/ || true
          git rm -rf coord/ || true
          git rm -rf dispatch/ || true
          git rm -rf gear/ || true
          git rm -rf media/ || true
          git rm -rf rants/ || true
          git rm -rf table/ || true
          git rm -rf templates/ || true
          git rm -rf transit/ || true

      - name: Remove one-time workflow files
        run: |
          git rm -f .github/workflows/rename-content.yml || true
          git rm -f .github/workflows/fix-gruene-day-spa.yml || true
          git rm -f .github/workflows/delete-migrated-content.yml || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove stale pre-Astro folders and root files" || echo "Nothing to remove"
          git push
