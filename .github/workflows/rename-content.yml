name: Rename content .md to .mdoc

on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Rename .md to .mdoc inside src/content only
        run: |
          find src/content -name "*.md" -type f | while read file; do
            newname="${file%.md}.mdoc"
            git mv "$file" "$newname"
            echo "Renamed: $file -> $newname"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: rename src/content .md to .mdoc for Keystatic" || echo "Nothing to rename"
          git push
