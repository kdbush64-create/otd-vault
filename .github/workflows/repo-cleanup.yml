name: Repository cleanup — remove stale files

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Remove stale root-level files
        run: |
          git rm -f index.html || true
          git rm -f sitemap.xml || true
          git rm -f .nojekyll || true
          git rm -f gear-policy.md || true

      - name: Remove one-time workflow files
        run: |
          git rm -f .github/workflows/rename-content.yml || true
          git rm -f .github/workflows/fix-gruene-day-spa.yml || true
          git rm -f .github/workflows/delete-migrated-content.yml || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove stale pre-Astro files and one-time workflows" || echo "Nothing to remove"
          git push
