name: Fix gruene-day-spa content

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Overwrite gruene-day-spa.mdoc with clean content
        run: |
          cat > src/content/coord/gruene-day-spa.mdoc << 'EOF'
          ---
          title: Gruene Day Spa
          date: 2026-02-16
          description: Day at the spa
          tags: []
          address: "1633 New Braunfels St, New Braunfels, TX 78130"
          website: "https://www.gruenedayspa.com/"
          ---
          SUMMARY: The wife of yours truly (Old Texas Dude in case you forgot) scheduled a couples massage in the spirit of Valentine's Day. It was my first time getting a massage here, and my first one in just over 30 years. Joe worked me over, and Barb worked on Mrs. OTD. We both wobbled out of there totally relaxed and ready for the drive back to Fort Worth. In fact, I am still relaxed 2 days later. Thank you, Barb and Joe. I will be back for another one. Call them up and make an appointment. Tell them Courtney's Dad sent you via his blog. Their number is +1-830-832-5599

          FINAL ANALYSIS: Top Tier Destination. Get the deep tissue massage if you know what is good for you. Don't skip this place.

          Gruene is a tourist stop while in the New Braunfels area. You can walk around, and everything is close by, including the historic Gruene Dance Hall, which is Texas's oldest (https://gruenehall.com/). So worth the stop.
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/coord/gruene-day-spa.mdoc
          git commit -m "fix: overwrite corrupted gruene-day-spa.mdoc with clean content"
          git push
